<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-mono, monospace); background: transparent; color: var(--color-text-primary); }

  .app { display: flex; flex-direction: column; gap: 0; min-height: 600px; }

  .toolbar {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    flex-wrap: wrap;
  }

  .toolbar-label {
    font-size: 11px; color: var(--color-text-secondary); font-family: var(--font-sans); letter-spacing: 0.05em; text-transform: uppercase;
    white-space: nowrap;
  }

  .level-tabs { display: flex; gap: 2px; }
  .level-tab {
    font-family: var(--font-sans); font-size: 12px; padding: 4px 10px;
    border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md);
    background: transparent; color: var(--color-text-secondary); cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .level-tab:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
  .level-tab.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }

  .divider { width: 0.5px; height: 20px; background: var(--color-border-tertiary); margin: 0 4px; }

  .toggle-group { display: flex; gap: 6px; align-items: center; }
  .toggle-btn {
    font-family: var(--font-sans); font-size: 12px; padding: 4px 10px;
    border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md);
    background: transparent; color: var(--color-text-secondary); cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .toggle-btn.on { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
  .toggle-btn:hover { border-color: var(--color-border-primary); color: var(--color-text-primary); }

  .panels { display: grid; grid-template-columns: 1fr 1fr; flex: 1; }

  .panel { display: flex; flex-direction: column; }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 12px; border-bottom: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
  }
  .panel-header-left { display: flex; align-items: center; gap: 8px; }
  .panel-title { font-family: var(--font-sans); font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }

  .lang-badge {
    font-size: 10px; font-family: var(--font-sans); padding: 2px 7px;
    border-radius: 999px; border: 0.5px solid var(--color-border-secondary);
    color: var(--color-text-secondary); background: var(--color-background-primary);
  }

  .stats-row {
    display: flex; gap: 10px;
  }
  .stat { font-family: var(--font-sans); font-size: 11px; color: var(--color-text-secondary); }
  .stat span { color: var(--color-text-primary); font-weight: 500; }

  .code-area {
    flex: 1; width: 100%; resize: none; padding: 12px;
    font-family: var(--font-mono, monospace); font-size: 12.5px; line-height: 1.65;
    background: var(--color-background-primary); color: var(--color-text-primary);
    border: none; outline: none;
    border-right: 0.5px solid var(--color-border-tertiary);
    min-height: 420px;
  }
  .code-area.output { background: var(--color-background-secondary); cursor: default; }

  .action-bar {
    display: flex; gap: 8px; padding: 8px 12px;
    border-top: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    align-items: center; justify-content: space-between;
  }
  .action-btn {
    font-family: var(--font-sans); font-size: 12px; padding: 5px 14px;
    border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md);
    background: var(--color-background-primary); color: var(--color-text-primary);
    cursor: pointer; transition: all 0.15s;
  }
  .action-btn:hover { background: var(--color-background-secondary); border-color: var(--color-border-primary); }
  .action-btn.primary {
    background: var(--color-text-primary); color: var(--color-background-primary);
    border-color: var(--color-text-primary);
  }
  .action-btn.primary:hover { opacity: 0.85; }

  .reduction-badge {
    font-family: var(--font-sans); font-size: 11px; color: var(--color-text-secondary);
  }
  .reduction-badge span { color: var(--color-text-primary); font-weight: 500; }

  .placeholder {
    font-family: var(--font-sans); font-size: 13px; color: var(--color-text-secondary);
    padding: 40px 20px; text-align: center; line-height: 1.8;
  }

  .level-desc {
    font-family: var(--font-sans); font-size: 11px; color: var(--color-text-secondary);
    padding: 5px 12px; border-bottom: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary); font-style: italic;
    display: flex; align-items: center; gap: 6px;
  }

  select.lang-select {
    font-family: var(--font-sans); font-size: 11px; padding: 2px 6px;
    border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md);
    background: var(--color-background-primary); color: var(--color-text-secondary);
    cursor: pointer; outline: none;
  }
</style>
</head>
<body>
<div class="app">

  <div class="toolbar">
    <span class="toolbar-label">Level</span>
    <div class="level-tabs" id="levelTabs">
      <button class="level-tab active" data-level="0">readable</button>
      <button class="level-tab" data-level="1">compact</button>
      <button class="level-tab" data-level="2">minified</button>
      <button class="level-tab" data-level="3">nuclear</button>
    </div>
    <div class="divider"></div>
    <span class="toolbar-label">Options</span>
    <div class="toggle-group">
      <button class="toggle-btn on" id="toggleComments">comments</button>
      <button class="toggle-btn on" id="toggleIndent">indentation</button>
      <button class="toggle-btn on" id="toggleBlankLines">blank lines</button>
      <button class="toggle-btn on" id="toggleOperators">operator spacing</button>
    </div>
    <div class="divider"></div>
    <select class="lang-select" id="langOverride">
      <option value="auto">auto-detect</option>
      <option value="js">javascript</option>
      <option value="python">python</option>
      <option value="css">css</option>
      <option value="html">html</option>
      <option value="java">java</option>
      <option value="c">c/c++</option>
      <option value="rust">rust</option>
      <option value="go">go</option>
      <option value="ruby">ruby</option>
      <option value="php">php</option>
      <option value="swift">swift</option>
    </select>
  </div>

  <div id="levelDesc" class="level-desc">
    <i class="ti ti-sparkles" aria-hidden="true" style="font-size:13px"></i>
    <span id="levelDescText">Removes empty lines and extra operator spacing — keeps comments and indentation.</span>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-header-left">
          <span class="panel-title">input</span>
          <span class="lang-badge" id="detectedLang">paste code</span>
        </div>
        <div class="stats-row">
          <span class="stat">lines: <span id="inLines">0</span></span>
          <span class="stat">chars: <span id="inChars">0</span></span>
        </div>
      </div>
      <textarea class="code-area" id="inputCode" placeholder="Paste your code here..." spellcheck="false"></textarea>
      <div class="action-bar">
        <button class="action-btn" onclick="document.getElementById('inputCode').value=''; updateAll();">clear</button>
        <button class="action-btn primary" onclick="runClean()">clean →</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-header-left">
          <span class="panel-title">output</span>
        </div>
        <div class="stats-row">
          <span class="stat">lines: <span id="outLines">—</span></span>
          <span class="stat">chars: <span id="outChars">—</span></span>
        </div>
      </div>
      <textarea class="code-area output" id="outputCode" placeholder="Cleaned code will appear here..." readonly spellcheck="false"></textarea>
      <div class="action-bar">
        <span class="reduction-badge" id="reductionBadge"></span>
        <button class="action-btn" onclick="copyOutput()">copy</button>
      </div>
    </div>
  </div>
</div>

<script>
const LEVELS = [
  {
    name: "readable",
    desc: "Removes empty lines and extra operator spacing — keeps comments and indentation.",
    removeComments: false, removeIndent: false, removeBlankLines: true, fixOperators: true, collapseAll: false
  },
  {
    name: "compact",
    desc: "Removes empty lines, comments, and normalizes spacing. Keeps indentation for readability.",
    removeComments: true, removeIndent: false, removeBlankLines: true, fixOperators: true, collapseAll: false
  },
  {
    name: "minified",
    desc: "Strips comments, blank lines, and indentation. Collapses to minimal whitespace.",
    removeComments: true, removeIndent: true, removeBlankLines: true, fixOperators: true, collapseAll: false
  },
  {
    name: "nuclear",
    desc: "Removes absolutely everything — no spaces, no newlines, no comments. Unreadably dense.",
    removeComments: true, removeIndent: true, removeBlankLines: true, fixOperators: true, collapseAll: true
  }
];

let currentLevel = 0;
let options = { removeComments: false, removeIndent: true, removeBlankLines: true, fixOperators: true };

function detectLang(code) {
  if (!code.trim()) return null;
  const scores = {
    python: 0, js: 0, css: 0, html: 0, java: 0, c: 0, rust: 0, go: 0, ruby: 0, php: 0, swift: 0
  };
  if (/def\s+\w+\s*\(|import\s+\w+|from\s+\w+\s+import|print\s*\(|:\s*$|^\s*#\s*\w/m.test(code)) scores.python += 3;
  if (/elif\s+|lambda\s+|__name__|\.format\(|f['"]/.test(code)) scores.python += 2;
  if (/function\s+\w+|const\s+|let\s+|var\s+|=>\s*{|require\(|module\.exports|console\.log/.test(code)) scores.js += 3;
  if (/document\.|window\.|async\s+function|\.then\(|Promise\./.test(code)) scores.js += 2;
  if (/\{[\s\S]*:\s*[\w#"']+;|@media|@keyframes|\.[\w-]+\s*\{|#[\w-]+\s*\{/.test(code)) scores.css += 4;
  if (/<html|<div|<span|<body|<head|<!DOCTYPE/.test(code)) scores.html += 4;
  if (/public\s+(static\s+)?(?:void|class|int|String)|System\.out|import\s+java\./.test(code)) scores.java += 4;
  if (/#include\s+<|printf\s*\(|int\s+main\s*\(|std::/.test(code)) scores.c += 4;
  if (/fn\s+\w+|let\s+mut|impl\s+\w+|use\s+std::|println!/.test(code)) scores.rust += 4;
  if (/func\s+\w+.*{|package\s+main|fmt\.Println|:=\s/.test(code)) scores.go += 4;
  if (/def\s+\w+|puts\s+|end\s*$|\.each\s*\{|attr_accessor/.test(code)) scores.ruby += 3;
  if (/<\?php|echo\s+|function\s+\w+|\$\w+\s*=/.test(code)) scores.php += 4;
  if (/var\s+\w+:|let\s+\w+:|func\s+\w+.*->|UIViewController|print\(/.test(code)) scores.swift += 4;
  let best = null, bestScore = 0;
  for (const [lang, score] of Object.entries(scores)) {
    if (score > bestScore) { bestScore = score; best = lang; }
  }
  return bestScore > 0 ? best : 'text';
}

const LANG_NAMES = { python:'python', js:'javascript', css:'css', html:'html', java:'java', c:'c/c++', rust:'rust', go:'go', ruby:'ruby', php:'php', swift:'swift', text:'text' };

function stripLineComments(code, lang) {
  if (lang === 'python' || lang === 'ruby') return code.replace(/(?<!['"#])#[^\n]*/g, '');
  if (lang === 'html') return code.replace(/<!--[\s\S]*?-->/g, '');
  if (lang === 'css') return code.replace(/\/\*[\s\S]*?\*\//g, '');
  return code.replace(/\/\/[^\n]*/g, '').replace(/\/\*[\s\S]*?\*\//g, '');
}

function fixOperatorSpacing(code, lang) {
  if (lang === 'html' || lang === 'css') return code;
  return code
    .replace(/([^=!<>])=([^>=])/g, '$1 = $2')
    .replace(/([^<])([+\-*\/%&|^])([^=\-+>\/\*])/g, (m, a, op, b) => a + ' ' + op + ' ' + b)
    .replace(/,([^\s\n])/g, ', $1')
    .replace(/\s{2,}/g, ' ')
    .replace(/([^\s])\s*\(\s*/g, '$1(')
    .replace(/\s+\)/g, ')');
}

function cleanCode(code, level, opts, lang) {
  let lines = code.split('\n');
  const effectiveOpts = {
    removeComments: level.removeComments || opts.removeComments,
    removeIndent: level.removeIndent || opts.removeIndent,
    removeBlankLines: level.removeBlankLines || opts.removeBlankLines,
    fixOperators: level.fixOperators || opts.fixOperators,
    collapseAll: level.collapseAll
  };

  let result = code;

  if (effectiveOpts.removeComments) {
    result = stripLineComments(result, lang);
  }

  lines = result.split('\n');

  lines = lines.map(line => {
    let l = line;
    if (effectiveOpts.removeIndent) {
      l = l.trimStart();
    }
    l = l.trimEnd();
    return l;
  });

  if (effectiveOpts.removeBlankLines) {
    lines = lines.filter(l => l.trim() !== '');
  }

  if (effectiveOpts.fixOperators) {
    lines = lines.map(l => fixOperatorSpacing(l, lang));
  }

  result = lines.join(effectiveOpts.collapseAll ? ' ' : '\n');

  if (effectiveOpts.collapseAll) {
    result = result.replace(/\s+/g, ' ').trim();
  }

  return result;
}

function getLang() {
  const override = document.getElementById('langOverride').value;
  if (override !== 'auto') return override;
  const code = document.getElementById('inputCode').value;
  return detectLang(code) || 'text';
}

function updateAll() {
  const code = document.getElementById('inputCode').value;
  const lang = getLang();
  const langName = LANG_NAMES[lang] || lang;
  document.getElementById('detectedLang').textContent = langName;
  const lines = code.split('\n').length;
  const chars = code.length;
  document.getElementById('inLines').textContent = lines;
  document.getElementById('inChars').textContent = chars;
  if (code.trim()) runClean();
  else {
    document.getElementById('outputCode').value = '';
    document.getElementById('outLines').textContent = '—';
    document.getElementById('outChars').textContent = '—';
    document.getElementById('reductionBadge').innerHTML = '';
  }
}

function runClean() {
  const code = document.getElementById('inputCode').value;
  if (!code.trim()) return;
  const lang = getLang();
  const level = LEVELS[currentLevel];
  const cleaned = cleanCode(code, level, options, lang);
  document.getElementById('outputCode').value = cleaned;
  const outLines = cleaned.split('\n').length;
  const outChars = cleaned.length;
  document.getElementById('outLines').textContent = outLines;
  document.getElementById('outChars').textContent = outChars;
  const inChars = code.length;
  if (inChars > 0) {
    const reduction = Math.round((1 - outChars / inChars) * 100);
    document.getElementById('reductionBadge').innerHTML = `<span>${reduction}%</span> smaller`;
  }
}

function copyOutput() {
  const out = document.getElementById('outputCode').value;
  if (!out) return;
  navigator.clipboard.writeText(out).catch(() => {});
}

document.querySelectorAll('.level-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentLevel = parseInt(tab.dataset.level);
    document.getElementById('levelDescText').textContent = LEVELS[currentLevel].desc;
    syncTogglesFromLevel();
    runClean();
  });
});

function syncTogglesFromLevel() {
  const l = LEVELS[currentLevel];
  setToggle('toggleComments', !l.removeComments);
  setToggle('toggleIndent', !l.removeIndent);
  setToggle('toggleBlankLines', l.removeBlankLines);
  setToggle('toggleOperators', l.fixOperators);
}

function setToggle(id, on) {
  const el = document.getElementById(id);
  if (on) el.classList.add('on'); else el.classList.remove('on');
}

function wireToggle(id, optKey, invert) {
  const el = document.getElementById(id);
  el.addEventListener('click', () => {
    el.classList.toggle('on');
    const isOn = el.classList.contains('on');
    options[optKey] = invert ? !isOn : isOn;
    runClean();
  });
}

wireToggle('toggleComments', 'removeComments', true);
wireToggle('toggleIndent', 'removeIndent', true);
wireToggle('toggleBlankLines', 'removeBlankLines', false);
wireToggle('toggleOperators', 'fixOperators', false);

document.getElementById('inputCode').addEventListener('input', updateAll);
document.getElementById('langOverride').addEventListener('change', updateAll);
</script>
</body>
</html>
